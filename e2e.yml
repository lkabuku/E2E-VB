name: Tests de non-régression

on:
  push:
    branches: [main, master, develop]
  pull_request:
  # Déclenchement manuel possible depuis l'interface GitHub
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e-tests   # ← adapter si le dossier est ailleurs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e-tests/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Installer les navigateurs Playwright
        run: npx playwright install --with-deps chromium

      - name: Lancer les tests
        run: npm run test:ci
        env:
          # Optionnel : surcharger la baseURL selon la branche deployée
          # BASE_URL: ${{ vars.STAGING_URL }}
          CI: true

      - name: Publier le rapport HTML (en cas d'échec)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e-tests/playwright-report/
          retention-days: 7
